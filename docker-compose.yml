services:
  db:
    image: postgres:16-alpine
    container_name: cyanea-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cyanea}
      POSTGRES_USER: ${POSTGRES_USER:-cyanea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cyanea}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: cyanea-backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-cyanea}:${POSTGRES_PASSWORD:-cyanea}@db:5432/${POSTGRES_DB:-cyanea}
      CORS_ORIGINS: http://localhost:8081,http://127.0.0.1:8081,http://localhost:5173
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  mailpit:
    image: axllent/mailpit
    container_name: cyanea-mailpit
    ports:
      - "1025:1025" 
      - "8025:8025" 

volumes:
  postgres_data: